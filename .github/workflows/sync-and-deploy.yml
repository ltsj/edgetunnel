name: Sync upstream and deploy Worker

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Deploy the current main branch even if it was deployed before
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sync-and-deploy-production
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'ltsj/edgetunnel'
    runs-on: ubuntu-latest
    outputs:
      current_sha: ${{ steps.sync.outputs.current_sha }}
      should_deploy: ${{ steps.sync.outputs.should_deploy }}

    steps:
      - name: Sync fork with cmliu/edgetunnel
        id: sync
        env:
          FORCE_DEPLOY: ${{ inputs.force_deploy || false }}
          GH_TOKEN: ${{ github.token }}
        run: |
          response="$(gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/merge-upstream" \
            -f branch=main)"

          message="$(jq -r '.message' <<<"$response")"
          merge_type="$(jq -r '.merge_type' <<<"$response")"
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          should_deploy=false

          if [[ "$FORCE_DEPLOY" == "true" || "$merge_type" != "none" ]]; then
            should_deploy=true
          fi

          echo "$message"
          echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ${{ matrix.environment }}
    needs: sync
    if: needs.sync.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: false
      matrix:
        environment:
          - cloudflare-1
          - cloudflare-2
    env:
      ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
      AUTODEPLOY_ENABLED: ${{ vars.AUTODEPLOY_ENABLED }}
      HEALTH_URL: ${{ vars.CF_HEALTH_URL }}
      KV_NAMESPACE_ID: ${{ vars.CF_KV_NAMESPACE_ID }}
      WORKER_NAME: ${{ vars.CF_WORKER_NAME }}

    steps:
      - name: Check out the synchronized branch
        if: vars.AUTODEPLOY_ENABLED == 'true'
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate deployment configuration
        id: config
        if: vars.AUTODEPLOY_ENABLED == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for value in \
            "$ACCOUNT_ID" \
            "$CLOUDFLARE_API_TOKEN" \
            "$HEALTH_URL" \
            "$KV_NAMESPACE_ID" \
            "$WORKER_NAME"; do
            if [[ -z "$value" ]]; then
              echo "A required Cloudflare secret or variable is missing." >&2
              exit 1
            fi
          done

          response="$(curl --fail --silent --show-error \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          )"

          jq --exit-status '.success == true' <<<"$response" > /dev/null
          worker_exists="$(jq --arg name "$WORKER_NAME" \
            '[.result[] | select(.id == $name)] | length > 0' \
            <<<"$response")"
          echo "worker_exists=$worker_exists" >> "$GITHUB_OUTPUT"

      - name: Record the current production version
        id: previous
        if: vars.AUTODEPLOY_ENABLED == 'true' && steps.config.outputs.worker_exists == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          version_id="$(curl --fail --silent --show-error \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/deployments" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq --exit-status --raw-output '.result.deployments[0].versions[0].version_id')"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Create production Wrangler configuration
        if: vars.AUTODEPLOY_ENABLED == 'true'
        run: |
          cat > "$RUNNER_TEMP/wrangler.deploy.toml" <<EOF
          name = "$WORKER_NAME"
          main = "${GITHUB_WORKSPACE}/_worker.js"
          compatibility_date = "2026-07-04"
          keep_vars = true
          workers_dev = true
          preview_urls = false

          [observability]
          enabled = true

          [observability.logs]
          enabled = true

          [[kv_namespaces]]
          binding = "KV"
          id = "$KV_NAMESPACE_ID"
          EOF

      - name: Deploy synchronized code
        id: deploy
        if: vars.AUTODEPLOY_ENABLED == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@4.107.0 deploy \
            --config "$RUNNER_TEMP/wrangler.deploy.toml" \
            --message "Automated upstream sync: ${{ needs.sync.outputs.current_sha }}"

      - name: Check the production endpoint
        id: health
        if: vars.AUTODEPLOY_ENABLED == 'true'
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 5 \
            --output /dev/null \
            "${HEALTH_URL}/"

      - name: Roll back after a failed health check
        if: failure() && steps.deploy.outcome == 'success' && steps.health.outcome == 'failure' && steps.previous.outputs.version_id != ''
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@4.107.0 rollback \
            "${{ steps.previous.outputs.version_id }}" \
            --config "$RUNNER_TEMP/wrangler.deploy.toml" \
            --message "Automated rollback after a failed health check" \
            --yes

      - name: Report disabled deployment
        if: vars.AUTODEPLOY_ENABLED != 'true'
        run: echo "Deployment to ${{ matrix.environment }} is disabled until its Cloudflare configuration is complete."
